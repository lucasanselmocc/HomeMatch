<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HomeMatch | Detalhes do imóvel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    .icon-svg { display: inline-block; width: 20px; height: 20px; flex-shrink: 0; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .owner-box { border: 1px solid rgba(37,99,235,0.24); background: #eff6ff; color: #1e3a8a; border-radius: 4px; padding: 12px 14px; margin: 12px 0; }
    .owner-box strong { display: block; margin-bottom: 2px; }
    .photo-viewer { background: var(--hm-surface); border: 1px solid var(--hm-border); border-radius: var(--hm-radius); padding: 12px; }
    .photo-viewer__main { position: relative; height: min(560px, 55vh); min-height: 320px; border-radius: 4px; overflow: hidden; background: #e9ecef; cursor: zoom-in; }
    .photo-viewer__main img { width: 100%; height: 100%; object-fit: cover; display: block; user-select: none; }
    .photo-viewer__empty { height: 100%; display: grid; place-items: center; color: var(--hm-muted); font-weight: 800; }
    .photo-nav { position: absolute; top: 50%; transform: translateY(-50%); width: 40px; height: 40px; border: 0; border-radius: 4px; background: rgba(255,255,255,0.92); color: var(--hm-text); font-size: 1.2rem; font-weight: 900; cursor: pointer; box-shadow: 0 1px 4px rgba(0,0,0,0.1); display: grid; place-items: center; }
    .photo-nav--prev { left: 12px; }
    .photo-nav--next { right: 12px; }
    .photo-counter { position: absolute; right: 12px; bottom: 12px; border-radius: 4px; background: rgba(0,0,0,0.7); color: #fff; font-weight: 800; padding: 4px 10px; font-size: .8rem; }
    .photo-thumbs { display: flex; gap: 8px; margin-top: 10px; overflow-x: auto; padding-bottom: 4px; }
    .photo-thumb { width: 76px; height: 56px; border: 2px solid transparent; border-radius: 4px; overflow: hidden; background: #e9ecef; flex: 0 0 auto; cursor: pointer; padding: 0; }
    .photo-thumb.is-active { border-color: var(--hm-red); }
    .photo-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .photo-attributes { margin-top: 10px; min-height: 28px; }
    .photo-attributes__title { color: var(--hm-muted); font-size: .75rem; font-weight: 900; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 6px; }
    .photo-attributes .chip { font-size: .75rem; padding: 4px 8px; }
    .lightbox { position: fixed; inset: 0; z-index: 2000; background: rgba(2,6,23,0.88); display: none; align-items: center; justify-content: center; padding: 20px; }
    .lightbox.is-open { display: flex; }
    .lightbox__image { max-width: min(1180px, 94vw); max-height: 86vh; border-radius: 4px; object-fit: contain; background: #0f172a; }
    .lightbox__close, .lightbox__nav { position: fixed; border: 0; border-radius: 4px; background: rgba(255,255,255,0.12); color: #fff; cursor: pointer; backdrop-filter: blur(4px); }
    .lightbox__close { top: 20px; right: 20px; width: 40px; height: 40px; font-size: 1.4rem; }
    .lightbox__nav { top: 50%; transform: translateY(-50%); width: 48px; height: 48px; font-size: 1.8rem; }
    .lightbox__nav--prev { left: 20px; }
    .lightbox__nav--next { right: 20px; }
    .lightbox__caption { position: fixed; left: 50%; bottom: 16px; transform: translateX(-50%); color: #fff; background: rgba(0,0,0,0.6); border-radius: 4px; padding: 6px 14px; font-weight: 800; font-size: .85rem; }
    .details-hero { display: grid; grid-template-columns: 1.05fr 0.95fr; gap: 24px; align-items: start; }
    .details-panel { padding: 20px; }
    .stat-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin: 16px 0; }
    .stat { padding: 12px; border-radius: 4px; background: rgba(23,54,87,0.06); }
    .stat strong { display: block; color: var(--hm-blue); font-size: 1.2rem; }
    .ai-box { margin-top: 16px; padding: 16px; border-radius: 4px; background: #f1f5f9; border: 1px solid var(--hm-border); }
    .description-section { padding: 40px 0 16px; }
    .reviews-section { padding: 40px 0 16px; }
    .review-list { display: grid; gap: 14px; }
    .review-item { background: var(--hm-surface); border: 1px solid var(--hm-border); border-radius: var(--hm-radius); padding: 16px; }
    .review-item__header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
    .review-item__author { font-weight: 800; color: var(--hm-blue); font-size: .9rem; }
    .stars { color: #f59e0b; font-size: 1rem; letter-spacing: 1px; }
    .review-item__comment { color: #405069; font-size: .9rem; line-height: 1.5; }
    .review-item__date { color: var(--hm-muted); font-size: .75rem; margin-top: 4px; }
    .review-form { margin-top: 18px; background: #f1f5f9; padding: 18px; border-radius: var(--hm-radius); }
    .review-form h3 { font-size: 1rem; margin-bottom: 10px; }
    @media (max-width: 900px) { .details-hero { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header class="navbar"><div class="navbar__inner">
    <a class="brand" href="index.html" aria-label="HomeMatch"><img class="brand-logo" src="assets/homematch-logo.jpeg" alt="HomeMatch"></a>
    <nav class="navbar__links" id="nav-links">
      <a href="index.html">Início</a>
      <a href="imoveis.html">Imóveis</a>
      <div class="nav-dropdown" id="user-menu" style="display:none;">
        <button class="btn btn--small btn--ghost" id="user-dropdown-btn">Minha Conta ▾</button>
        <div class="dropdown-content">
          <a href="perfil.html">Perfil</a>
          <a href="anunciante.html" id="drop-advertiser" style="display:none;">Meus anúncios</a>
          <a href="#" id="drop-logout">Sair</a>
        </div>
      </div>
      <a class="btn btn--small" href="login.html" id="nav-auth-btn">Entrar</a>
    </nav>
  </div></header>

  <main class="container" id="main-content"><div class="loading-state"><div class="spinner"></div><br>Carregando imóvel…</div></main>

  <div class="lightbox" id="lightbox" aria-hidden="true">
    <button class="lightbox__close" id="lightbox-close" type="button">✕</button>
    <button class="lightbox__nav lightbox__nav--prev" id="lightbox-prev" type="button">‹</button>
    <img class="lightbox__image" id="lightbox-image" alt="Foto ampliada do imóvel">
    <button class="lightbox__nav lightbox__nav--next" id="lightbox-next" type="button">›</button>
    <div class="lightbox__caption" id="lightbox-caption"></div>
  </div>

  <footer class="footer">HomeMatch</footer>

  <script type="module">
    import { getProperty, getReviews, createReview, addFavorite, removeFavorite, getFavorites, getMe, Auth, logout, fmtPrice, TYPE_LABEL, PURPOSE_LABEL, BASE_URL } from "./assets/api.js";

    if (Auth.isLoggedIn()) {
      document.getElementById("nav-auth-btn").style.display = "none";
      const menu = document.getElementById("user-menu");
      menu.style.display = "inline-block";
      getMe().then(user => { if (user.user_type === "A") document.getElementById("drop-advertiser").style.display = "block"; }).catch(() => {});
      document.getElementById("drop-logout").addEventListener("click", async (e) => { e.preventDefault(); await logout(); window.location.href = "index.html"; });
    }

    const main = document.getElementById("main-content");
    const params = new URLSearchParams(location.search);
    const id = params.get("id");
    const urlMatchScore = params.get("match_score");
    let currentPhotoIndex = 0, currentPhotos = [], currentProperty = null;

    if (!id) { main.innerHTML = `<div class="alert alert--error">Nenhum imóvel selecionado. <a href="imoveis.html">Ver lista de imóveis →</a></div>`; throw new Error("No id"); }

    const AI_ATTRIBUTE_LABELS = { pt: { "aesthetics.color.brightness": "Luminosidade", "livability.coziness": "Aconchego", "livability.verdancy": "Presença de verde", "livability.spaciousness": "Amplitude", "current_state.ventilation": "Ventilação", "current_state.cleanliness": "Limpeza", "current_state.structural_integrity": "Integridade estrutural", "current_state.leisure": "Área de lazer", "aesthetics.architecture.contemporary": "Arquitetura contemporânea", "aesthetics.architecture.minimalist": "Arquitetura minimalista", "aesthetics.architecture.postmodern": "Arquitetura pós-moderna" }, en: {} };
    function getBrowserLang() { return (navigator.language || "pt").slice(0,2).toLowerCase(); }
    function formatAttributeLabel(token) { const lang = getBrowserLang(); const labels = AI_ATTRIBUTE_LABELS[lang] || AI_ATTRIBUTE_LABELS.pt; return labels[token] || token.split(".").slice(-1)[0].replace(/_/g, " "); }
    function formatStrength(value) { return `${Math.round(Number(value || 0) * 100)}%`; }
    function resolveImageUrl(url) { if (!url) return ""; if (url.startsWith("http://") || url.startsWith("https://")) return url; if (url.startsWith("/")) return `${BASE_URL}${url}`; return `${BASE_URL}/${url}`; }
    function stars(rating) { const r = Math.round(rating || 0); return "★".repeat(r) + "☆".repeat(5 - r); }
    function isOwner(prop, user) { if (!prop || !user) return false; const owner = prop.owner ?? prop.owner_id ?? prop.ownerId; if (owner !== undefined && owner !== null) return Number(owner) === Number(user.id); return prop.owner_name && prop.owner_name === user.name; }
    function hasMatchScore(value) { return value !== undefined && value !== null && value !== ""; }
    function getEffectiveMatchScore(prop) { if (hasMatchScore(prop.match_score)) return prop.match_score; if (hasMatchScore(urlMatchScore)) return urlMatchScore; return null; }
    function formatMatchScore(value) { const numeric = Number(value); if (isNaN(numeric)) return null; const percentage = numeric <= 1 ? numeric * 100 : numeric; return `${Math.round(percentage)}%`; }
    function matchScoreHtml(prop) { const value = getEffectiveMatchScore(prop); if (!hasMatchScore(value)) return ""; const formatted = formatMatchScore(value); if (!formatted) return ""; return `<div class="chips" style="margin:6px 0"><span class="chip chip--red" title="Compatibilidade calculada pela busca">Match ${formatted}</span></div>`; }
    function photoAttributes(photo, prop) { if (photo?.subjective_attributes?.length) return photo.subjective_attributes.map(a => ({ token: a.attribute_token, value: a.strength })); return (prop?.subjective_attributes ?? []).map(a => ({ token: a.attribute_token, value: a.strength_mean })); }
    function attributesHtml(attrs, { emptyMessage = "Atributos visuais ainda não disponíveis.", limit = 6 } = {}) {
      if (!attrs?.length) return `<p class="muted" style="font-size:.8rem">${emptyMessage}</p>`;
      const chips = attrs.filter(a => Number(a.value) > 0).sort((a,b) => Number(b.value) - Number(a.value)).slice(0, limit).map(a => `<span class="chip chip--red" title="${a.token}">${formatAttributeLabel(a.token)} <small>${formatStrength(a.value)}</small></span>`).join("");
      return chips ? `<div class="chips">${chips}</div>` : `<p class="muted" style="font-size:.8rem">${emptyMessage}</p>`;
    }
    function aiAttributesHtml(attrs) { return attributesHtml((attrs ?? []).map(a => ({ token: a.attribute_token, value: a.strength_mean })), { emptyMessage: "Análise visual ainda não realizada para este imóvel.", limit: 8 }); }
    function normalizePhotos(prop) { return (prop.images ?? []).map((photo, index) => ({ ...photo, index, resolvedUrl: resolveImageUrl(photo.url) })); }
    function photoViewerHtml(prop) {
      currentPhotos = normalizePhotos(prop); currentPhotoIndex = 0;
      if (!currentPhotos.length) return `<div class="photo-viewer"><div class="photo-viewer__main"><div class="photo-viewer__empty">Sem fotos disponíveis</div></div></div>`;
      const thumbs = currentPhotos.map((photo, index) => `<button class="photo-thumb ${index === 0 ? "is-active" : ""}" type="button" data-photo-index="${index}" aria-label="Ver foto ${index + 1}"><img src="${photo.resolvedUrl}" alt="Miniatura ${index + 1}"></button>`).join("");
      return `
        <div class="photo-viewer" id="photo-viewer">
          <div class="photo-viewer__main" id="photo-main" role="button" tabindex="0" aria-label="Abrir foto em tela cheia">
            <img id="main-photo-img" src="${currentPhotos[0].resolvedUrl}" alt="Foto principal do imóvel">
            ${currentPhotos.length > 1 ? `<button class="photo-nav photo-nav--prev" id="photo-prev" type="button">‹</button><button class="photo-nav photo-nav--next" id="photo-next" type="button">›</button>` : ""}
            <span class="photo-counter" id="photo-counter">1 / ${currentPhotos.length}</span>
          </div>
          <div class="photo-attributes" id="photo-attributes">
            <div class="photo-attributes__title">Atributos da foto</div>
            ${attributesHtml(photoAttributes(currentPhotos[0], prop), { limit: 5 })}
          </div>
          ${currentPhotos.length > 1 ? `<div class="photo-thumbs" id="photo-thumbs">${thumbs}</div>` : ""}
        </div>`;
    }
    function updatePhotoView(index) {
      if (!currentPhotos.length) return;
      currentPhotoIndex = (index + currentPhotos.length) % currentPhotos.length;
      const photo = currentPhotos[currentPhotoIndex];
      document.getElementById("main-photo-img").src = photo.resolvedUrl;
      document.getElementById("photo-counter").textContent = `${currentPhotoIndex + 1} / ${currentPhotos.length}`;
      document.getElementById("photo-attributes").innerHTML = `<div class="photo-attributes__title">Atributos da foto</div>${attributesHtml(photoAttributes(photo, currentProperty), { limit: 5 })}`;
      document.querySelectorAll(".photo-thumb").forEach(btn => btn.classList.toggle("is-active", Number(btn.dataset.photoIndex) === currentPhotoIndex));
      updateLightbox();
    }
    function openLightbox() { if (!currentPhotos.length) return; document.getElementById("lightbox").classList.add("is-open"); document.body.style.overflow = "hidden"; updateLightbox(); }
    function closeLightbox() { document.getElementById("lightbox").classList.remove("is-open"); document.body.style.overflow = ""; }
    function updateLightbox() { const photo = currentPhotos[currentPhotoIndex]; if (!photo) return; document.getElementById("lightbox-image").src = photo.resolvedUrl; document.getElementById("lightbox-caption").textContent = `Foto ${currentPhotoIndex + 1} de ${currentPhotos.length}`; }
    function renderReviews(reviews) {
      if (!reviews.length) return `<p class="muted">Seja o primeiro a avaliar este imóvel.</p>`;
      return reviews.map(r => `<div class="review-item"><div class="review-item__header"><span class="review-item__author">${r.user_name ?? "Usuário"}</span><span class="stars">${stars(r.rating)}</span></div>${r.comment ? `<p class="review-item__comment">${r.comment}</p>` : ""}<p class="review-item__date">${new Date(r.created_at).toLocaleDateString("pt-BR")}</p></div>`).join("");
    }
    function ownerNoticeHtml(prop) { return `<div class="owner-box"><strong>Este anúncio é seu.</strong> Você está visualizando como anunciante. Por isso, ações de buscador como favoritar, avaliar ou demonstrar interesse ficam indisponíveis no próprio anúncio.<div style="margin-top:8px"><a class="btn btn--small" href="anuncio_form.html?id=${prop.id}">Editar anúncio</a></div></div>`; }
    function actionButtonsHtml(prop, ownsProperty, isFav) {
      if (ownsProperty) return `<div class="details-actions"><a class="btn" href="anuncio_form.html?id=${prop.id}">Editar anúncio</a><a class="btn btn--ghost" href="anunciante.html">Meus anúncios</a><a class="btn btn--ghost" href="imoveis.html">← Ver outros</a></div>`;
      return `<div class="details-actions">${Auth.isLoggedIn() ? `<button class="btn" id="btn-fav">${isFav ? "♥ Favoritado" : "♡ Favoritar"}</button>` : `<a class="btn" href="login.html?next=detalhes.html?id=${id}">Favoritar</a>`}<a class="btn btn--ghost" href="imoveis.html">← Ver outros</a></div>`;
    }
    function reviewFormHtml(ownsProperty) {
      if (ownsProperty) return `<div class="owner-box"><strong>Avaliações indisponíveis para o dono.</strong> Você não pode avaliar o próprio anúncio.</div>`;
      if (!Auth.isLoggedIn()) return `<p class="muted"><a href="login.html">Entre</a> para deixar uma avaliação.</p>`;
      return `<div class="review-form"><h3>Deixe sua avaliação</h3><div id="review-alert"></div><div class="field"><label for="r-rating">Nota (1–5)</label><select id="r-rating"><option value="5">★★★★★ Excelente</option><option value="4">★★★★☆ Muito bom</option><option value="3">★★★☆☆ Bom</option><option value="2">★★☆☆☆ Regular</option><option value="1">★☆☆☆☆ Ruim</option></select></div><div class="field"><label for="r-comment">Comentário (opcional)</label><textarea id="r-comment" rows="3" style="width:100%;border:1px solid var(--hm-border);border-radius:4px;padding:8px 10px;font:inherit;resize:vertical;" placeholder="Compartilhe sua experiência…"></textarea></div><button class="btn" id="btn-review">Enviar avaliação</button></div>`;
    }

    async function render() {
      let prop, reviews, user = null, isFav = false;
      try { [prop, reviews] = await Promise.all([getProperty(id), getReviews(id)]); }
      catch { main.innerHTML = `<div class="alert alert--error">Imóvel não encontrado. <a href="imoveis.html">Voltar →</a></div>`; return; }
      currentProperty = prop;
      if (Auth.isLoggedIn()) { try { user = await getMe(); } catch { user = null; } }
      const ownsProperty = isOwner(prop, user);
      if (Auth.isLoggedIn() && !ownsProperty) { try { const favsRaw = await getFavorites(); const favs = Array.isArray(favsRaw) ? favsRaw : (favsRaw.results ?? []); isFav = favs.some(f => Number(f.id) === Number(prop.id)); } catch {} }
      const typeLabel = TYPE_LABEL[prop.type] ?? prop.type;
      const purposeLabel = PURPOSE_LABEL[prop.property_purpose] ?? prop.property_purpose;
      const rating = prop.average_rating;
      const matchHtml = matchScoreHtml(prop);

      main.innerHTML = `
        <section class="page-title">
          <span class="kicker">${typeLabel} · ${purposeLabel}</span>
          <h1>${prop.description?.split(".")[0] || `${typeLabel} em ${prop.neighborhood}`}</h1>
          <p class="lead">${fmtPrice(prop.price)}${prop.property_purpose === "R" ? "/mês" : ""} · ${prop.neighborhood}, ${prop.city}</p>
        </section>
        ${ownsProperty ? ownerNoticeHtml(prop) : ""}
        <section class="details-hero">
          ${photoViewerHtml(prop)}
          <aside class="details-panel">
            <strong class="price">${fmtPrice(prop.price)}${prop.property_purpose === "R" ? "<span style='font-size:.7em;font-weight:600;color:var(--hm-muted)'>/mês</span>" : ""}</strong>
            ${rating ? `<div class="chips" style="margin:6px 0"><span class="chip chip--red">★ ${Number(rating).toFixed(1)} (${reviews.length} avaliação${reviews.length !== 1 ? "ões" : ""})</span></div>` : ""}
            ${!ownsProperty ? matchHtml : ""}
            <p class="muted">${prop.description ?? ""}</p>
            <div class="stat-grid">
              <div class="stat"><strong>${prop.rooms?.bedrooms ?? "—"}</strong><span>quarto${prop.rooms?.bedrooms !== 1 ? "s" : ""}</span></div>
              <div class="stat"><strong>${prop.rooms?.bathrooms ?? "—"}</strong><span>banheiro${prop.rooms?.bathrooms !== 1 ? "s" : ""}</span></div>
              <div class="stat"><strong>${prop.area}</strong><span>m²</span></div>
            </div>
            <div class="chips">
              ${prop.rooms?.parking_spots ? `<span class="chip">${prop.rooms.parking_spots} vaga${prop.rooms.parking_spots !== 1 ? "s" : ""}</span>` : ""}
              ${prop.has_mobilia ? `<span class="chip">Mobiliado</span>` : ""}
              ${prop.condo?.name ? `<span class="chip">Cond. ${prop.condo.name}</span>` : ""}
              ${prop.floor_number ? `<span class="chip">${prop.floor_number}º andar</span>` : ""}
            </div>
            <div class="ai-box"><h3>Análise visual por IA</h3>${aiAttributesHtml(prop.subjective_attributes)}</div>
            ${actionButtonsHtml(prop, ownsProperty, isFav)}
          </aside>
        </section>
        <section class="description-section">
          <h2>Descrição</h2>
          <p class="lead">${prop.description ?? "Sem descrição."}</p>
          ${prop.address ? `<p class="muted">📍 ${prop.address}, ${prop.neighborhood}, ${prop.city}</p>` : ""}
          ${prop.owner_name ? `<p class="muted">Anunciante: <strong>${prop.owner_name}</strong></p>` : ""}
        </section>
        <section class="reviews-section">
          <h2>Avaliações</h2>
          <div class="review-list" id="review-list">${renderReviews(reviews)}</div>
          ${reviewFormHtml(ownsProperty)}
        </section>`;

      bindPhotoViewerEvents();

      const favBtn = document.getElementById("btn-fav");
      if (favBtn && !ownsProperty) {
        favBtn.addEventListener("click", async () => {
          try {
            if (isFav) { await removeFavorite(prop.id); isFav = false; favBtn.textContent = "♡ Favoritar"; }
            else { await addFavorite(prop.id); isFav = true; favBtn.textContent = "♥ Favoritado"; }
          } catch (err) { alert(err.message); }
        });
      }

      const revBtn = document.getElementById("btn-review");
      if (revBtn && !ownsProperty) {
        revBtn.addEventListener("click", async () => {
          const alertEl = document.getElementById("review-alert");
          alertEl.innerHTML = "";
          const rating = +document.getElementById("r-rating").value;
          const comment = document.getElementById("r-comment").value.trim();
          revBtn.disabled = true;
          try {
            await createReview(id, rating, comment);
            const newReviews = await getReviews(id);
            document.getElementById("review-list").innerHTML = renderReviews(newReviews);
            alertEl.innerHTML = `<div class="alert alert--success">Avaliação enviada!</div>`;
          } catch (err) {
            const data = err.data || {};
            const msg = data.detail || Object.values(data).flat().find(Boolean) || err.message || "Erro ao enviar avaliação.";
            alertEl.innerHTML = `<div class="alert alert--error">${msg}</div>`;
          }
          revBtn.disabled = false;
        });
      }
    }

    function bindPhotoViewerEvents() {
      const mainPhoto = document.getElementById("photo-main");
      const prev = document.getElementById("photo-prev");
      const next = document.getElementById("photo-next");
      const thumbs = document.getElementById("photo-thumbs");
      if (prev) prev.addEventListener("click", (e) => { e.stopPropagation(); updatePhotoView(currentPhotoIndex - 1); });
      if (next) next.addEventListener("click", (e) => { e.stopPropagation(); updatePhotoView(currentPhotoIndex + 1); });
      if (mainPhoto) { mainPhoto.addEventListener("click", openLightbox); mainPhoto.addEventListener("keydown", (e) => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); openLightbox(); } }); }
      if (thumbs) thumbs.addEventListener("click", (e) => { const btn = e.target.closest("[data-photo-index]"); if (!btn) return; updatePhotoView(Number(btn.dataset.photoIndex)); });
    }

    document.getElementById("lightbox-close").addEventListener("click", closeLightbox);
    document.getElementById("lightbox-prev").addEventListener("click", () => updatePhotoView(currentPhotoIndex - 1));
    document.getElementById("lightbox-next").addEventListener("click", () => updatePhotoView(currentPhotoIndex + 1));
    document.getElementById("lightbox").addEventListener("click", (e) => { if (e.target.id === "lightbox") closeLightbox(); });
    document.addEventListener("keydown", (e) => { const isOpen = document.getElementById("lightbox").classList.contains("is-open"); if (!isOpen) return; if (e.key === "Escape") closeLightbox(); if (e.key === "ArrowLeft") updatePhotoView(currentPhotoIndex - 1); if (e.key === "ArrowRight") updatePhotoView(currentPhotoIndex + 1); });

    render();
  </script>
</body>
</html>
