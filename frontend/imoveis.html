<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HomeMatch | Imóveis</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">

  <style>
    .view-tabs {
      display: flex;
      gap: 10px;
      margin: 22px 0 18px;
      flex-wrap: wrap;
    }

    .view-tab {
      border: 1px solid var(--hm-border);
      background: #fff;
      color: var(--hm-text);
      border-radius: 999px;
      padding: 10px 16px;
      font-weight: 800;
      cursor: pointer;
      transition: .15s ease;
    }

    .view-tab:hover {
      transform: translateY(-1px);
      border-color: rgba(220, 38, 38, .45);
    }

    .view-tab.is-active {
      background: var(--hm-red);
      border-color: var(--hm-red);
      color: #fff;
    }

    .favorite-card-btn {
      position: absolute;
      top: 14px;
      right: 14px;
      z-index: 3;
      width: 42px;
      height: 42px;
      border: 0;
      border-radius: 999px;
      background: rgba(255, 255, 255, .92);
      box-shadow: 0 8px 24px rgba(0,0,0,.18);
      color: var(--hm-red);
      font-size: 1.15rem;
      font-weight: 900;
      cursor: pointer;
      display: grid;
      place-items: center;
      transition: .15s ease;
    }

    .favorite-card-btn:hover {
      transform: scale(1.06);
      background: #fff;
    }

    .favorite-card-btn.is-favorite {
      background: var(--hm-red);
      color: #fff;
    }

    .favorite-card-btn:disabled {
      opacity: .65;
      cursor: wait;
    }

    .property-card__badge--left {
      left: 14px;
      right: auto;
    }

    .property-card__badge--right-under-fav {
      left: auto;
      right: 64px;
    }

    .hover-preview {
      position: fixed;
      z-index: 1000;
      width: min(360px, calc(100vw - 32px));
      background: #fff;
      border: 1px solid var(--hm-border);
      border-radius: 22px;
      box-shadow: 0 22px 60px rgba(15, 23, 42, .25);
      overflow: hidden;
      pointer-events: none;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity .12s ease, transform .12s ease;
    }

    .hover-preview.is-visible {
      opacity: 1;
      transform: translateY(0);
    }

    .hover-preview__photo {
      height: 210px;
      background: linear-gradient(135deg, #fee2e2, #f8fafc);
    }

    .hover-preview__photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .hover-preview__body {
      padding: 16px;
    }

    .hover-preview__title {
      font-weight: 900;
      color: var(--hm-text);
      margin-bottom: 6px;
    }

    .hover-preview__desc {
      color: var(--hm-muted);
      font-size: .9rem;
      line-height: 1.45;
      display: -webkit-box;
      -webkit-line-clamp: 5;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .hover-preview__meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .hover-preview__meta span {
      border: 1px solid var(--hm-border);
      border-radius: 999px;
      padding: 5px 9px;
      font-size: .78rem;
      font-weight: 800;
      color: var(--hm-muted);
    }

    @media (hover: none) {
      .hover-preview {
        display: none;
      }
    }
  </style>
</head>
<body>
  <header class="navbar">
    <div class="navbar__inner">
      <a class="brand" href="index.html" aria-label="HomeMatch">
        <img class="brand-logo" src="assets/homematch-logo.jpeg" alt="HomeMatch">
      </a>

      <nav class="navbar__links">
        <a href="index.html">Início</a>
        <a href="imoveis.html">Imóveis</a>
        <a class="btn btn--small" href="login.html" id="nav-auth-btn">Entrar</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="page-title">
      <span class="kicker">Buscar imóveis</span>
      <h1>Encontre o lugar certo.</h1>
    </section>

    <div class="view-tabs" aria-label="Alternar visualização de imóveis">
      <button class="view-tab is-active" id="tab-all" type="button">Todos os imóveis</button>
      <button class="view-tab" id="tab-favorites" type="button">Favoritos</button>
    </div>

    <div id="search-notice" style="display:none; margin-bottom:18px;">
      <div class="ai-box" style="margin:0">
        <strong>Busca por linguagem natural:</strong> <span id="query-text"></span>
        <p class="muted" style="margin:6px 0 0; font-size:.9rem;">
          A consulta será enviada ao módulo de busca do backend.
        </p>
      </div>
    </div>

    <div class="filter-bar" id="filter-bar">
      <div class="filter-group filter-group--wide">
        <label for="f-search">Busca</label>
        <input id="f-search" type="text" placeholder="Ex: casa clara, arejada e aconchegante">
      </div>

      <div class="filter-group filter-group--wide">
        <label for="f-city">Cidade</label>
        <input id="f-city" type="text" placeholder="Ex: Natal">
      </div>

      <div class="filter-group">
        <label for="f-neighborhood">Bairro</label>
        <input id="f-neighborhood" type="text" placeholder="Ex: Ponta Negra">
      </div>

      <div class="filter-group">
        <label for="f-type">Tipo</label>
        <select id="f-type">
          <option value="">Todos</option>
          <option value="H">Casa</option>
          <option value="A">Apartamento</option>
        </select>
      </div>

      <div class="filter-group">
        <label for="f-purpose">Finalidade</label>
        <select id="f-purpose">
          <option value="">Todas</option>
          <option value="S">Venda</option>
          <option value="R">Aluguel</option>
        </select>
      </div>

      <div class="filter-group">
        <label for="f-bedrooms">Quartos</label>
        <select id="f-bedrooms">
          <option value="">Qualquer</option>
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
        </select>
      </div>

      <div class="filter-group">
        <label for="f-min-price">Preço mín.</label>
        <input id="f-min-price" type="number" placeholder="R$ 0" min="0">
      </div>

      <div class="filter-group">
        <label for="f-max-price">Preço máx.</label>
        <input id="f-max-price" type="number" placeholder="Sem limite" min="0">
      </div>

      <div class="filter-group">
        <label>&nbsp;</label>
        <button class="btn" id="btn-filter">Buscar</button>
      </div>
    </div>

    <div class="results-bar">
      <span id="results-count"></span>
    </div>

    <div id="property-grid" class="property-grid"></div>
  </main>

  <div class="hover-preview" id="hover-preview" aria-hidden="true"></div>

  <footer class="footer">HomeMatch</footer>

  <script type="module">
    import {
      getProperties,
      searchProperties,
      getFavorites,
      addFavorite,
      removeFavorite,
      Auth,
      fmtPrice,
      TYPE_LABEL,
      PURPOSE_LABEL,
      BASE_URL
    } from "./assets/api.js";

    if (Auth.isLoggedIn()) {
      const btn = document.getElementById("nav-auth-btn");
      btn.textContent = "Minha Conta";
      btn.href = "perfil.html";
    }

    const urlParams = new URLSearchParams(location.search);
    const grid = document.getElementById("property-grid");
    const countEl = document.getElementById("results-count");
    const preview = document.getElementById("hover-preview");
    const tabAll = document.getElementById("tab-all");
    const tabFavorites = document.getElementById("tab-favorites");

    let currentTab = "all";
    let favoriteIds = new Set();
    let lastItems = [];
    let previewTimer = null;
    let previewIndex = 0;
    let previewImages = [];
    let previewProperty = null;

    document.getElementById("f-search").value = urlParams.get("q") || "";
    document.getElementById("f-city").value = urlParams.get("city") || "";

    function resolveImageUrl(url) {
      if (!url) return "";
      if (url.startsWith("http://") || url.startsWith("https://")) return url;
      return `${BASE_URL}${url}`;
    }

    function normalizeListResponse(data) {
      return Array.isArray(data) ? data : (data.results ?? []);
    }

    function hasMatchScore(p) {
      return p.match_score !== undefined && p.match_score !== null;
    }

    function formatMatchScore(value) {
      const numeric = Number(value);
      if (Number.isNaN(numeric)) return null;
      const percentage = numeric <= 1 ? numeric * 100 : numeric;
      return `${Math.round(percentage)}%`;
    }

    function matchScoreHtml(p) {
      if (!hasMatchScore(p)) return "";
      const formatted = formatMatchScore(p.match_score);
      if (!formatted) return "";

      return `
        <div class="chips" style="margin-top:10px;">
          <span class="chip chip--red" title="Compatibilidade calculada pela busca">
            Match ${formatted}
          </span>
        </div>`;
    }

    function detailsHref(p) {
      const params = new URLSearchParams();
      params.set("id", p.id);

      if (hasMatchScore(p)) {
        params.set("match_score", p.match_score);
      }

      return `detalhes.html?${params.toString()}`;
    }

    function buildParams() {
      return {
        q: document.getElementById("f-search").value.trim(),
        city: document.getElementById("f-city").value.trim(),
        neighborhood: document.getElementById("f-neighborhood").value.trim(),
        type: document.getElementById("f-type").value,
        property_purpose: document.getElementById("f-purpose").value,
        bedrooms: document.getElementById("f-bedrooms").value,
        min_price: document.getElementById("f-min-price").value,
        max_price: document.getElementById("f-max-price").value,
      };
    }

    function buildPublicUrl(params) {
      const qs = new URLSearchParams();

      if (params.q) qs.set("q", params.q);
      if (params.city) qs.set("city", params.city);
      if (currentTab === "favorites") qs.set("tab", "favorites");

      return qs.toString()
        ? `imoveis.html?${qs.toString()}`
        : "imoveis.html";
    }

    function syncUrl(params) {
      history.replaceState(null, "", buildPublicUrl(params));
    }

    function renderSearchNotice(query) {
      const notice = document.getElementById("search-notice");
      const text = document.getElementById("query-text");

      if (!query || currentTab === "favorites") {
        notice.style.display = "none";
        text.textContent = "";
        return;
      }

      notice.style.display = "block";
      text.textContent = `"${query}"`;
    }

    function setActiveTab(tab) {
      currentTab = tab;
      tabAll.classList.toggle("is-active", tab === "all");
      tabFavorites.classList.toggle("is-active", tab === "favorites");
      document.getElementById("filter-bar").style.display = tab === "favorites" ? "none" : "";
    }

    async function refreshFavoriteIds() {
      favoriteIds = new Set();

      if (!Auth.isLoggedIn()) return;

      try {
        const favs = normalizeListResponse(await getFavorites());
        favs.forEach(p => favoriteIds.add(Number(p.id)));
      } catch {
        favoriteIds = new Set();
      }
    }

    function favoriteButtonHtml(p) {
      const isFav = favoriteIds.has(Number(p.id));
      const label = isFav ? "Remover dos favoritos" : "Adicionar aos favoritos";

      return `
        <button
          class="favorite-card-btn ${isFav ? "is-favorite" : ""}"
          type="button"
          data-favorite-id="${p.id}"
          title="${label}"
          aria-label="${label}">
          ${isFav ? "♥" : "♡"}
        </button>`;
    }

    function renderCard(p) {
      const imgSrc = p.images?.[0]?.url ? resolveImageUrl(p.images[0].url) : null;

      const photoHtml = imgSrc
        ? `<img src="${imgSrc}" alt="Foto do imóvel" loading="lazy" onerror="this.remove()">`
        : "";

      const typeLabel = TYPE_LABEL[p.type] ?? p.type;
      const purposeLabel = PURPOSE_LABEL[p.property_purpose] ?? p.property_purpose;
      const beds = p.rooms?.bedrooms ?? "—";
      const baths = p.rooms?.bathrooms ?? "—";
      const href = detailsHref(p);

      const ratingHtml = p.average_rating
        ? `<div class="chips"><span class="chip chip--red">★ ${Number(p.average_rating).toFixed(1)}</span></div>`
        : "";

      const matchHtml = matchScoreHtml(p);

      return `
        <article class="property-card" data-property-id="${p.id}">
          <a href="${href}" class="property-card__link">
            <div class="property-card__photo">
              ${photoHtml}
              ${favoriteButtonHtml(p)}
              <span class="property-card__badge property-card__badge--left">${typeLabel}</span>
              <span class="property-card__badge property-card__badge--red property-card__badge--right-under-fav">
                ${purposeLabel}
              </span>
            </div>
          </a>

          <div class="property-card__body">
            <div class="property-card__price">
              ${fmtPrice(p.price)}
              <span style="font-size:.75rem;font-weight:600;color:var(--hm-muted)">
                ${p.property_purpose === "R" ? "/mês" : ""}
              </span>
            </div>

            <p class="property-card__address">${p.neighborhood}, ${p.city}</p>

            <div class="property-card__stats">
              <span>🛏 ${beds} quarto${beds !== 1 ? "s" : ""}</span>
              <span>🚿 ${baths} banheiro${baths !== 1 ? "s" : ""}</span>
              <span>📐 ${p.area} m²</span>
            </div>

            ${ratingHtml}
            ${matchHtml}

            <a
              class="btn btn--ghost btn--small"
              style="margin-top:14px;width:100%;text-align:center;"
              href="${href}">
              Ver detalhes
            </a>
          </div>
        </article>`;
    }

    function renderLoading() {
      grid.innerHTML = `
        <div class="loading-state" style="grid-column:1/-1">
          <div class="spinner"></div><br>Carregando imóveis…
        </div>`;
      countEl.textContent = "";
    }

    function renderEmpty() {
      const message = currentTab === "favorites"
        ? "Você ainda não adicionou imóveis aos favoritos."
        : "Nenhum imóvel encontrado com esses critérios.";

      grid.innerHTML = `
        <div class="empty-state" style="grid-column:1/-1">
          <div class="empty-state__icon">🏠</div>
          <p class="muted">${message}</p>
        </div>`;
    }

    function renderError(msg) {
      grid.innerHTML = `<div class="alert alert--error" style="grid-column:1/-1">${msg}</div>`;
    }

    function renderItems(items) {
      lastItems = items;

      countEl.textContent =
        `${items.length} imóvel${items.length !== 1 ? "is" : ""} encontrado${items.length !== 1 ? "s" : ""}`;

      if (!items.length) {
        renderEmpty();
        return;
      }

      grid.innerHTML = items.map(renderCard).join("");
    }

    function previewContent(p, imgUrl) {
      const typeLabel = TYPE_LABEL[p.type] ?? p.type;
      const purposeLabel = PURPOSE_LABEL[p.property_purpose] ?? p.property_purpose;
      const beds = p.rooms?.bedrooms ?? "—";
      const baths = p.rooms?.bathrooms ?? "—";

      return `
        <div class="hover-preview__photo">
          ${imgUrl ? `<img src="${imgUrl}" alt="Prévia do imóvel">` : ""}
        </div>
        <div class="hover-preview__body">
          <div class="hover-preview__title">${fmtPrice(p.price)}${p.property_purpose === "R" ? "/mês" : ""}</div>
          <p class="hover-preview__desc">${p.description ?? "Sem descrição."}</p>
          <div class="hover-preview__meta">
            <span>${typeLabel}</span>
            <span>${purposeLabel}</span>
            <span>${beds} quarto${beds !== 1 ? "s" : ""}</span>
            <span>${baths} banheiro${baths !== 1 ? "s" : ""}</span>
          </div>
        </div>`;
    }

    function positionPreview(event) {
      const margin = 18;
      const previewWidth = preview.offsetWidth || 360;
      const previewHeight = preview.offsetHeight || 360;

      let left = event.clientX + margin;
      let top = event.clientY + margin;

      if (left + previewWidth > window.innerWidth - margin) {
        left = event.clientX - previewWidth - margin;
      }

      if (top + previewHeight > window.innerHeight - margin) {
        top = window.innerHeight - previewHeight - margin;
      }

      preview.style.left = `${Math.max(margin, left)}px`;
      preview.style.top = `${Math.max(margin, top)}px`;
    }

    function showHoverPreview(p, event) {
      clearInterval(previewTimer);

      previewProperty = p;
      previewImages = (p.images ?? []).map(img => resolveImageUrl(img.url)).filter(Boolean);
      previewIndex = 0;

      const firstImage = previewImages[0] ?? "";
      preview.innerHTML = previewContent(p, firstImage);
      positionPreview(event);
      preview.classList.add("is-visible");

      if (previewImages.length > 1) {
        previewTimer = setInterval(() => {
          previewIndex = (previewIndex + 1) % previewImages.length;
          preview.innerHTML = previewContent(previewProperty, previewImages[previewIndex]);
        }, 1100);
      }
    }

    function hideHoverPreview() {
      clearInterval(previewTimer);
      previewTimer = null;
      preview.classList.remove("is-visible");
      preview.innerHTML = "";
      previewProperty = null;
      previewImages = [];
    }

    async function load() {
      renderLoading();

      const params = buildParams();

      syncUrl(params);
      renderSearchNotice(params.q);
      await refreshFavoriteIds();

      try {
        if (currentTab === "favorites") {
          if (!Auth.isLoggedIn()) {
            renderError(`Entre na sua conta para ver seus favoritos. <a href="login.html">Fazer login</a>`);
            return;
          }

          const data = await getFavorites();
          renderItems(normalizeListResponse(data));
          return;
        }

        const data = params.q
          ? await searchProperties(params)
          : await getProperties(params);

        renderItems(normalizeListResponse(data));
      } catch (err) {
        renderError(
          currentTab === "favorites"
            ? "Não foi possível carregar seus favoritos."
            : params.q
              ? "Não foi possível executar a busca. Verifique se o endpoint de busca está disponível."
              : "Não foi possível carregar os imóveis. Verifique se o servidor está rodando."
        );

        console.error(err);
      }
    }

    async function toggleFavorite(button) {
      if (!Auth.isLoggedIn()) {
        window.location.href = "login.html";
        return;
      }

      const propertyId = Number(button.dataset.favoriteId);
      const wasFavorite = favoriteIds.has(propertyId);

      button.disabled = true;

      try {
        if (wasFavorite) {
          await removeFavorite(propertyId);
          favoriteIds.delete(propertyId);
        } else {
          await addFavorite(propertyId);
          favoriteIds.add(propertyId);
        }

        if (currentTab === "favorites" && wasFavorite) {
          lastItems = lastItems.filter(p => Number(p.id) !== propertyId);
          renderItems(lastItems);
          return;
        }

        button.classList.toggle("is-favorite", !wasFavorite);
        button.textContent = wasFavorite ? "♡" : "♥";
        button.title = wasFavorite ? "Adicionar aos favoritos" : "Remover dos favoritos";
        button.setAttribute("aria-label", button.title);
      } catch (err) {
        alert(err.message || "Não foi possível atualizar os favoritos.");
      } finally {
        button.disabled = false;
      }
    }

    document.getElementById("btn-filter").addEventListener("click", () => {
      setActiveTab("all");
      load();
    });

    document.getElementById("filter-bar").addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        setActiveTab("all");
        load();
      }
    });

    tabAll.addEventListener("click", () => {
      setActiveTab("all");
      load();
    });

    tabFavorites.addEventListener("click", () => {
      setActiveTab("favorites");
      load();
    });

    grid.addEventListener("click", async (e) => {
      const favoriteButton = e.target.closest("[data-favorite-id]");

      if (!favoriteButton) return;

      e.preventDefault();
      e.stopPropagation();

      await toggleFavorite(favoriteButton);
    });

    grid.addEventListener("mouseenter", (e) => {
      const card = e.target.closest(".property-card");
      if (!card) return;

      const property = lastItems.find(p => Number(p.id) === Number(card.dataset.propertyId));
      if (!property) return;

      showHoverPreview(property, e);
    }, true);

    grid.addEventListener("mousemove", (e) => {
      if (preview.classList.contains("is-visible")) {
        positionPreview(e);
      }
    });

    grid.addEventListener("mouseleave", (e) => {
      if (e.target.closest(".property-card")) {
        hideHoverPreview();
      }
    }, true);

    if (urlParams.get("tab") === "favorites") {
      setActiveTab("favorites");
    }

    load();
  </script>
</body>
</html>
